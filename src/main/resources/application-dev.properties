# ===============================
# CONFIGURAÇÃO DO BANCO DE DADOS - DEV
# ===============================

# Database PostgreSQL - LOCAL
spring.datasource.url=jdbc:postgresql://localhost:5432/secure_messaging_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuração do connection pool HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.pool-name=SecureMessagingPool
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# CONFIGURAÇÃO JPA/HIBERNATE - DEV
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Otimizações para desenvolvimento
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ===============================
# CONFIGURAÇÕES DE DEBUG - DEV
# ===============================

# Logging da aplicação
logging.level.com.securemessaging=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Logging do Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Logging do SpringDoc
logging.level.org.springdoc=DEBUG

# Logging de transações
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG

# ===============================
# CONFIGURAÇÕES DE DESENVOLVIMENTO
# ===============================

# H2 Console (backup)
spring.h2.console.enabled=false

# Mostrar parâmetros de binding
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Configurações de desenvolvimento Web
server.error.include-stacktrace=always
server.error.include-message=always

# ===============================
# CONFIGURAÇÕES DE TESTE - DEV
# ===============================

# Inicialização de dados de teste
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ===============================
# CONFIGURAÇÕES DE PERFORMANCE - DEV
# ===============================

# Cache de segundo nível
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false