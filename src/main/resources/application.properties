# ===============================
# CONFIGURAÇÕES GERAIS
# ===============================

# Perfil ativo
spring.profiles.active=dev

# Configuração do servidor
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m

# Configuração de upload de arquivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ===============================
# CONFIGURAÇÃO SPRINGDOC OPENAPI
# ===============================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none

# ===============================
# CONFIGURAÇÃO DE CORS (SEGURO)
# ===============================

cors.allowed.origins=http://frontend:3000,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD
cors.allowed.headers=Authorization,Content-Type,Accept,Origin,User-Agent,Cache-Control,Keep-Alive,X-Requested-With,If-Modified-Since,X-File-Name
cors.exposed.headers=Authorization,Content-Type,Content-Disposition,X-File-Name
cors.allow.credentials=true
cors.max.age=3600

# ===============================
# CONFIGURAÇÕES JWT
# ===============================

jwt.secret=mySuperSecretKeyForSecureMessaging2025WithExtraSecurityForJWTGeneration
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===============================
# CONFIGURAÇÕES DE CRIPTOGRAFIA
# ===============================

# Chave do sistema para criptografia AES (32 caracteres)
system.encryption.key=my-secure-system-key-32-chars-long!

# Tamanhos de chave
crypto.aes.key-size=256
crypto.rsa.key-size=1024
crypto.dh.key-size=1024

# ===============================
# CONFIGURAÇÕES DE SEGURANÇA
# ===============================

# Proteção contra ataques
server.tomcat.remoteip.remote-ip-header=X-FORWARDED-FOR
server.tomcat.remoteip.protocol-header=X-FORWARDED-PROTO
server.tomcat.remoteip.internal-proxies=.*
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ===============================
# CONFIGURAÇÕES DE LOGGING (PRODUÇÃO)
# ===============================

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/secure-messaging.log

# ===============================
# CONFIGURAÇÕES DE MONITORAMENTO
# ===============================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Health check personalizado
management.health.db.enabled=true
management.health.diskspace.enabled=true